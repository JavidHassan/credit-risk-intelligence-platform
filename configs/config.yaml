# Credit Risk Intelligence Platform Configuration

data_generation:
  n_customers: 5000
  n_months: 24
  default_rate: 0.08
  seed: 42
  output_dir: "data/raw"

preprocessing:
  missing_threshold: 0.3
  outlier_std: 3.0
  output_dir: "data/processed"

features:
  rolling_windows: [3, 6, 12]
  target_column: "is_default"
  id_column: "customer_id"

model:
  test_size: 0.2
  random_state: 42
  models:
    - logistic_regression
    - random_forest
    - xgboost
  xgboost_params:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
  random_forest_params:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 5

risk:
  lgd_mean: 0.45
  lgd_std: 0.1
  ead_utilization_factor: 0.75
  stress_scenarios:
    mild:
      unemployment_increase: 0.02
      income_decrease: 0.05
      delinquency_increase: 0.03
    moderate:
      unemployment_increase: 0.05
      income_decrease: 0.10
      delinquency_increase: 0.08
    severe:
      unemployment_increase: 0.10
      income_decrease: 0.20
      delinquency_increase: 0.15

monitoring:
  drift_threshold: 0.05
  psi_threshold: 0.2
  performance_decay_threshold: 0.05
  retrain_trigger_psi: 0.25

api:
  host: "0.0.0.0"
  port: 8000
  model_path: "models/best_model.pkl"

dashboard:
  port: 8501
  refresh_interval: 300
